<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>KSP Engine Editor</title>
<link rel="stylesheet" href="style.css?v=39">
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <header>
      <h1>Engine Editor</h1>
      <nav id="topnav">
        <span class="navtab on">Engines</span>
        <a class="navtab" href="plumelib.html">Plume Library</a>
        <button id="btnCompile" class="ghost" title="Compile the manifest (custom plumes + engine variants) to GameData/zzzz_EngineEditor/">Compile / Apply →</button>
      </nav>
      <input id="search" type="search" placeholder="Search engines…" autocomplete="off">
      <div id="filters">
        <select id="modFilter"><option value="">All mods</option></select>
        <label><input type="checkbox" id="fWaterfall"> Waterfall</label>
        <label><input type="checkbox" id="fSwitch"> Switches</label>
        <label><input type="checkbox" id="fWarn"> ⚠</label>
        <label><input type="checkbox" id="fShowDeprecated"> Show deprecated</label>
      </div>
      <div id="compileOut" class="hidden"></div>
    </header>
    <ul id="partList"></ul>
  </aside>
  <main id="detail">
    <div class="placeholder">Select an engine</div>
  </main>
  <div id="splitter" title="Drag to resize"></div>
  <aside id="viewer">
    <div class="viewer-placeholder">Select an engine to view its 3D model</div>
  </aside>
</div>
<div id="changesBar" class="hidden">
  <span id="changeCount"></span>
  <button id="btnPreview">Preview patch</button>
  <button id="btnDiscard" class="ghost">Discard</button>
</div>
<div id="modal" class="hidden">
  <div id="modalBox">
    <h3>Generated ModuleManager patch</h3>
    <pre id="patchText"></pre>
    <div class="row">
      <input id="patchName" type="text" placeholder="filename (e.g. my-f1-tweaks)">
      <button id="btnSave">Save to GameData/zzzz_EngineEditor/</button>
      <button id="btnClose" class="ghost">Close</button>
    </div>
    <div id="saveMsg"></div>
  </div>
</div>
<!-- §9.2: the drawer is gone — the plume editor now mounts inline in the variant panel's
     Plume sub-tab (see mountPlumeReadonly()/mountPlumeEditable() in app.js). -->
<!-- Custom dialog overlay (no native modals) reused from the shared editor -->
<div id="eeOverlay"><div id="eeDialog"></div></div>
<datalist id="eeControllerList">
  <option value="throttle"></option><option value="atmosphereDepth"></option><option value="random"></option>
</datalist>
<script src="model3d.js?v=11"></script>
<script src="plume.js?v=18"></script>
<script src="plumeedit.js?v=38"></script>
<script src="app.js?v=39"></script>
</body>
</html>
